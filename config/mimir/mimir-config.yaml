server:
  http_listen_port: 9009

memberlist:
  join_members: ["127.0.0.1:7946"]

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/chunks
  tsdb:
    dir: /data/mimir/tsdb
    retention_period: 168h    # ← tempat yang benar untuk retention TSDB

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    kvstore:
      store: memberlist
    replication_factor: 1

compactor:
  data_dir: /data/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist
  deletion_delay: 0          # ← perbaikan nama field, 0 = hapus langsung setelah ditandai

limits:
  ingestion_rate: 1000000
  ingestion_burst_size: 2000000
  max_cache_freshness: 10m
  max_label_names_per_series: 40