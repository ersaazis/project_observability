apiVersion: 1
groups:
- orgId: 1
  name: server_alerts_mirror
  folder: Mirror
  interval: 1m
  rules:
  - uid: Mir_highmemoryusage
    title: HighMemoryUsage
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: mirror
    annotations:
      summary: 'High Memory Usage: {{ $labels.instance }}'
      description: 'RAM usage is over 85% for 5 minutes. (Current value: {{ printf
        "%.2f" $value }}%)'
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (node_memory_MemTotal_bytes{env="mirror"} - node_memory_MemAvailable_bytes{env="mirror"})
          / node_memory_MemTotal_bytes{env="mirror"} * 100 > 85
        refId: A
  - uid: Mir_highdiskusage
    title: HighDiskUsage
    condition: A
    for: 5m
    labels:
      severity: critical
      domain: server
      env: mirror
    annotations:
      summary: 'Disk Space Almost Full: {{ $labels.instance }}'
      description: Disk space is below 15%.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (node_filesystem_avail_bytes{env="mirror", fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"}
          / node_filesystem_size_bytes{env="mirror", fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"})
          * 100 < 15
        refId: A
  - uid: Mir_highdiskiowait
    title: HighDiskIOWait
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: mirror
    annotations:
      summary: 'High Disk IO Wait: {{ $labels.instance }}'
      description: Disk I/O wait is high.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: rate(node_cpu_seconds_total{env="mirror", mode="iowait"}[5m]) > 0.1
        refId: A
  - uid: Mir_highsystemload
    title: HighSystemLoad
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: mirror
    annotations:
      summary: 'High System Load: {{ $labels.instance }}'
      description: CPU Load exceeds the number of cores.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: node_load1{env="mirror"} > count without (cpu, mode) (node_cpu_seconds_total{env="mirror",
          mode="idle"})
        refId: A
  - uid: Mir_networkerrors
    title: NetworkErrors
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: mirror
    annotations:
      summary: 'Network Errors Detected: {{ $labels.instance }}'
      description: Network interfaces are dropping packets or reporting errors.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: rate(node_network_receive_drop_total{env="mirror"}[5m]) > 0 or rate(node_network_transmit_drop_total{env="mirror"}[5m])
          > 0 or rate(node_network_receive_errs_total{env="mirror"}[5m]) > 0 or rate(node_network_transmit_errs_total{env="mirror"}[5m])
          > 0
        refId: A
  - uid: Mir_hostdown
    title: HostDown
    condition: A
    for: 2m
    labels:
      severity: critical
      domain: server
      env: mirror
    annotations:
      summary: 'Host Down: {{ $labels.instance }}'
      description: Node exporter down for 2 minutes.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: up{env="mirror", job="integrations/node_exporter"} == 0
        refId: A
  - uid: Mir_oomkills
    title: OOMKills
    condition: A
    for: 0s
    labels:
      severity: critical
      domain: server
      env: mirror
    annotations:
      summary: OOM Kill Detected on {{ $labels.instance }}
      description: A container was killed due to Out Of Memory.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: increase(container_oom_events_total{env="mirror"}[5m]) > 0
        refId: A
- orgId: 1
  name: application_alerts_mirror
  folder: Mirror
  interval: 1m
  rules:
  - uid: Mir_blackboxuptimedown
    title: BlackboxUptimeDown
    condition: A
    for: 2m
    labels:
      severity: critical
      domain: application
      env: mirror
    annotations:
      summary: 'Endpoint Unreachable: {{ $labels.instance }}'
      description: Blackbox prober failed to reach the endpoint.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: probe_success{env="mirror"} == 0
        refId: A
  - uid: Mir_nginxerror500
    title: NginxError500
    condition: A
    for: 5m
    labels:
      severity: critical
      domain: application
      env: mirror
    annotations:
      summary: High Nginx 5xx Error Rate
      description: More than 5% of requests returned 5xx status codes.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: sum(rate(nginx_http_requests_total{env="mirror", status=~"5.."}[5m]))
          / sum(rate(nginx_http_requests_total{env="mirror"}[5m])) * 100 > 5
        refId: A
  - uid: Mir_tracingerror500
    title: TracingError500
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: application
      env: mirror
    annotations:
      summary: High Tracing Error Rate
      description: More than 5% of traced requests have errors.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: sum(rate(traces_spanmetrics_calls_total{env="mirror", status_code="STATUS_CODE_ERROR"}[5m]))
          / sum(rate(traces_spanmetrics_calls_total{env="mirror"}[5m])) * 100 > 5
        refId: A
  - uid: Mir_highresponsetime
    title: HighResponseTime
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: application
      env: mirror
    annotations:
      summary: 'High Latency: {{ $labels.instance }}'
      description: Response time is above 3 seconds.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: probe_duration_seconds{env="mirror"} > 3
        refId: A
  - uid: Mir_sslcertexpiring
    title: SSLCertExpiring
    condition: A
    for: 1h
    labels:
      severity: warning
      domain: application
      env: mirror
    annotations:
      summary: 'SSL Cert Expiring Soon: {{ $labels.instance }}'
      description: SSL certificate expires in less than 14 days.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: probe_ssl_earliest_cert_expiry{env="mirror"} - time() < 1209600
        refId: A
  - uid: Mir_appcontainerdown
    title: AppContainerDown
    condition: A
    for: 0s
    labels:
      severity: critical
      domain: application
      env: mirror
    annotations:
      summary: App/Traefik Container Down
      description: Container has not been seen for more than 60 seconds.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: time() - container_last_seen{env="mirror", name=~".*traefik.*|.*app.*"}
          > 60
        refId: A
- orgId: 1
  name: database_alerts_mirror
  folder: Mirror
  interval: 1m
  rules:
  - uid: Mir_dbconnectiondrop
    title: DBConnectionDrop
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: database
      env: mirror
    annotations:
      summary: Sudden DB Connections Spike/Drop
      description: Active connections dropped or spiked drastically.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: abs(deriv(pg_stat_activity_count{env="mirror"}[5m])) > 50
        refId: A
  - uid: Mir_dbdown
    title: DBDown
    condition: A
    for: 2m
    labels:
      severity: critical
      domain: database
      env: mirror
    annotations:
      summary: Database Down
      description: Database exporter cannot connect or is down.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: up{env="mirror", job=~".*postgres.*|.*mysql.*"} == 0
        refId: A
  - uid: Mir_highquerylatency
    title: HighQueryLatency
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: database
      env: mirror
    annotations:
      summary: High DB Query Latency
      description: Average query latency is unusually high.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: rate(pg_stat_database_blks_read{env="mirror"}[5m]) > 1000
        refId: A
  - uid: Mir_deadlocksdetected
    title: DeadlocksDetected
    condition: A
    for: 0s
    labels:
      severity: critical
      domain: database
      env: mirror
    annotations:
      summary: Deadlocks Detected
      description: Database deadlocks detected.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: increase(pg_stat_database_deadlocks{env="mirror"}[5m]) > 0
        refId: A
  - uid: Mir_dbdiskalmostfull
    title: DBDiskAlmostFull
    condition: A
    for: 5m
    labels:
      severity: critical
      domain: database
      env: mirror
    annotations:
      summary: DB Disk Almost Full
      description: Database disk space is below 20%.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (node_filesystem_avail_bytes{env="mirror", mountpoint=~".*/data.*|.*mysql.*"}
          / node_filesystem_size_bytes{env="mirror", mountpoint=~".*/data.*|.*mysql.*"})
          * 100 < 20
        refId: A
