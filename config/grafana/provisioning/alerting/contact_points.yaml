          chatid: "-4834347031"
  - orgId: 1
    name: 'Telegram Application Staging'
    receivers:
      - uid: telegram_app_stg
        type: telegram
        settings:
          bottoken: '${TELEGRAM_BOT_TOKEN_STG}'
          chatid: "-5266437611"
  - orgId: 1
    name: 'Telegram Database Staging'
    receivers:
      - uid: telegram_db_stg
        type: telegram
        settings:
          bottoken: '${TELEGRAM_BOT_TOKEN_STG}'
          chatid: "-4979826346"
          
  # MIRROR
  - orgId: 1
    name: 'Telegram Server Mirror'
    receivers:
      - uid: telegram_server_mir
        type: telegram
        settings:
          bottoken: '${TELEGRAM_BOT_TOKEN_MIR}'
          chatid: "-4834347031"
  - orgId: 1
    name: 'Telegram Application Mirror'
    receivers:
      - uid: telegram_app_mir
        type: telegram
