contactPoints:
  # DEVELOPMENT
  - orgId: 1
    name: 'Telegram Server Development'
    receivers:
      - uid: telegram_server_dev
        type: telegram
        settings:
          bottoken: '${TELEGRAM_BOT_TOKEN_DEV}'
          chatid: "-4834347031"
  - orgId: 1
    name: 'Telegram Application Development'
    receivers:
      - uid: telegram_app_dev
        type: telegram
        settings:
          bottoken: '${TELEGRAM_BOT_TOKEN_DEV}'
          chatid: "-5266437611"
  - orgId: 1
    name: 'Telegram Database Development'
    receivers:
      - uid: telegram_db_dev
        type: telegram
        settings:
          bottoken: '${TELEGRAM_BOT_TOKEN_DEV}'
          chatid: "-4979826346"

  # STAGING
  - orgId: 1
    name: 'Telegram Server Staging'
    receivers:
      - uid: telegram_server_stg
        type: telegram
