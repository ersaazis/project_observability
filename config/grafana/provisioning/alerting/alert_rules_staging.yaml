apiVersion: 1
groups:
- orgId: 1
  name: server_alerts_staging
  folder: Staging
  interval: 1m
  rules:
  - uid: Stg_highmemoryusage
    title: HighMemoryUsage
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: staging
    annotations:
      summary: 'High Memory Usage: {{ $labels.instance }}'
      description: 'RAM usage is over 85% for 5 minutes. (Current value: {{ printf
        "%.2f" $value }}%)'
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (node_memory_MemTotal_bytes{env="staging"} - node_memory_MemAvailable_bytes{env="staging"})
          / node_memory_MemTotal_bytes{env="staging"} * 100 > 85
        refId: A
  - uid: Stg_highdiskusage
    title: HighDiskUsage
    condition: A
    for: 5m
    labels:
      severity: critical
      domain: server
      env: staging
    annotations:
      summary: 'Disk Space Almost Full: {{ $labels.instance }}'
      description: Disk space is below 15%.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (node_filesystem_avail_bytes{env="staging", fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"}
          / node_filesystem_size_bytes{env="staging", fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"})
          * 100 < 15
        refId: A
  - uid: Stg_highdiskiowait
    title: HighDiskIOWait
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: staging
    annotations:
      summary: 'High Disk IO Wait: {{ $labels.instance }}'
      description: Disk I/O wait is high.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: rate(node_cpu_seconds_total{env="staging", mode="iowait"}[5m]) > 0.1
        refId: A
  - uid: Stg_highsystemload
    title: HighSystemLoad
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: staging
    annotations:
      summary: 'High System Load: {{ $labels.instance }}'
      description: CPU Load exceeds the number of cores.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: node_load1{env="staging"} > count without (cpu, mode) (node_cpu_seconds_total{env="staging",
          mode="idle"})
        refId: A
  - uid: Stg_networkerrors
    title: NetworkErrors
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: staging
    annotations:
      summary: 'Network Errors Detected: {{ $labels.instance }}'
      description: Network interfaces are dropping packets or reporting errors.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: rate(node_network_receive_drop_total{env="staging"}[5m]) > 0 or rate(node_network_transmit_drop_total{env="staging"}[5m])
          > 0 or rate(node_network_receive_errs_total{env="staging"}[5m]) > 0 or rate(node_network_transmit_errs_total{env="staging"}[5m])
          > 0
        refId: A
  - uid: Stg_hostdown
    title: HostDown
    condition: A
    for: 2m
    labels:
      severity: critical
      domain: server
      env: staging
    annotations:
      summary: 'Host Down: {{ $labels.instance }}'
      description: Node exporter down for 2 minutes.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: up{env="staging", job="integrations/node_exporter"} == 0
        refId: A
  - uid: Stg_oomkills
    title: OOMKills
    condition: A
    for: 0s
    labels:
      severity: critical
      domain: server
      env: staging
    annotations:
      summary: OOM Kill Detected on {{ $labels.instance }}
      description: A container was killed due to Out Of Memory.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: increase(container_oom_events_total{env="staging"}[5m]) > 0
        refId: A
- orgId: 1
  name: application_alerts_staging
  folder: Staging
  interval: 1m
  rules:
  - uid: Stg_blackboxuptimedown
    title: BlackboxUptimeDown
    condition: A
    for: 2m
    labels:
      severity: critical
      domain: application
      env: staging
    annotations:
      summary: 'Endpoint Unreachable: {{ $labels.instance }}'
      description: Blackbox prober failed to reach the endpoint.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: probe_success{env="staging"} == 0
        refId: A
  - uid: Stg_nginxerror500
    title: NginxError500
    condition: A
    for: 5m
    labels:
      severity: critical
      domain: application
      env: staging
    annotations:
      summary: 'High Nginx 5xx Error Rate: {{ $labels.instance }}'
      description: More than 5% of requests returned 5xx status codes.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (sum by (instance) (rate(nginx_http_requests_total{env="staging", status=~"5.."}[5m]))
          / sum by (instance) (rate(nginx_http_requests_total{env="staging"}[5m]))) * 100 > 5
        refId: A
  - uid: Stg_tracingerror500
    title: TracingError500
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: application
      env: staging
    annotations:
      summary: 'High Tracing Error Rate: {{ $labels.instance }}'
      description: More than 5% of traced requests have errors.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (sum by (instance) (rate(traces_spanmetrics_calls_total{env="staging", status_code="STATUS_CODE_ERROR"}[5m]))
          / sum by (instance) (rate(traces_spanmetrics_calls_total{env="staging"}[5m]))) * 100 > 5
        refId: A
  - uid: Stg_highresponsetime
    title: HighResponseTime
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: application
      env: staging
    annotations:
      summary: 'High Latency: {{ $labels.instance }}'
      description: Response time is above 3 seconds.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: probe_duration_seconds{env="staging"} > 3
        refId: A
  - uid: Stg_sslcertexpiring
    title: SSLCertExpiring
    condition: A
    for: 1h
    labels:
      severity: warning
      domain: application
      env: staging
    annotations:
      summary: 'SSL Cert Expiring Soon: {{ $labels.instance }}'
      description: SSL certificate expires in less than 14 days.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: probe_ssl_earliest_cert_expiry{env="staging"} - time() < 1209600
        refId: A
  - uid: Stg_appcontainerdown
    title: AppContainerDown
    condition: A
    for: 0s
    labels:
      severity: critical
      domain: application
      env: staging
    annotations:
      summary: 'App/Traefik Container Down: {{ $labels.instance }}'
      description: Container has not been seen for more than 60 seconds.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: time() - container_last_seen{env="staging", name=~".*traefik.*|.*app.*"}
          > 60
        refId: A
- orgId: 1
  name: database_alerts_staging
  folder: Staging
  interval: 1m
  rules:
  - uid: Stg_dbconnectiondrop
    title: DBConnectionDrop
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: database
      env: staging
    annotations:
      summary: 'Sudden DB Connections Spike/Drop: {{ $labels.instance }}'
      description: Active connections dropped or spiked drastically.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: abs(deriv(pg_stat_activity_count{env="staging"}[5m])) > 50
        refId: A
  - uid: Stg_dbdown
    title: DBDown
    condition: A
    for: 2m
    labels:
      severity: critical
      domain: database
      env: staging
    annotations:
      summary: 'Database Down: {{ $labels.instance }}'
      description: Database exporter cannot connect or is down.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: up{env="staging", job=~".*postgres.*|.*mysql.*"} == 0
        refId: A
  - uid: Stg_highquerylatency
    title: HighQueryLatency
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: database
      env: staging
    annotations:
      summary: 'High DB Query Latency: {{ $labels.instance }}'
      description: Average query latency is unusually high.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: rate(pg_stat_database_blks_read{env="staging"}[5m]) > 1000
        refId: A
  - uid: Stg_deadlocksdetected
    title: DeadlocksDetected
    condition: A
    for: 0s
    labels:
      severity: critical
      domain: database
      env: staging
    annotations:
      summary: 'Deadlocks Detected: {{ $labels.instance }}'
      description: Database deadlocks detected.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: increase(pg_stat_database_deadlocks{env="staging"}[5m]) > 0
        refId: A
  - uid: Stg_dbdiskalmostfull
    title: DBDiskAlmostFull
    condition: A
    for: 5m
    labels:
      severity: critical
      domain: database
      env: staging
    annotations:
      summary: 'DB Disk Almost Full: {{ $labels.instance }}'
      description: Database disk space is below 20%.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (node_filesystem_avail_bytes{env="staging", mountpoint=~".*/data.*|.*mysql.*"}
          / node_filesystem_size_bytes{env="staging", mountpoint=~".*/data.*|.*mysql.*"})
          * 100 < 20
        refId: A
