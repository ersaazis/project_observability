apiVersion: 1
groups:
- orgId: 1
  name: server_alerts_development
  folder: Development
  interval: 1m
  rules:
  - uid: Dev_highmemoryusage
    title: HighMemoryUsage
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: development
    annotations:
      summary: 'High Memory Usage: {{ $labels.instance }}'
      description: 'RAM usage is over 85% for 5 minutes. (Current value: {{ printf
        "%.2f" $value }}%)'
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (avg by (instance, env) (node_memory_MemTotal_bytes{env="development"} - node_memory_MemAvailable_bytes{env="development"})
          / avg by (instance, env) (node_memory_MemTotal_bytes{env="development"})) * 100 > 85
        refId: A
  - uid: Dev_highdiskusage
    title: HighDiskUsage
    condition: A
    for: 5m
    labels:
      severity: critical
      domain: server
      env: development
    annotations:
      summary: 'Disk Space Almost Full: {{ $labels.instance }}'
      description: Disk space is below 15%.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (avg by (instance, env, mountpoint) (node_filesystem_avail_bytes{env="development", fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"})
          / avg by (instance, env, mountpoint) (node_filesystem_size_bytes{env="development", fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"}))
          * 100 < 15
        refId: A
  - uid: Dev_highdiskiowait
    title: HighDiskIOWait
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: development
    annotations:
      summary: 'High Disk IO Wait: {{ $labels.instance }}'
      description: Disk I/O wait is high.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: avg by (instance, env) (rate(node_cpu_seconds_total{env="development", mode="iowait"}[5m])) > 0.1
        refId: A
  - uid: Dev_highsystemload
    title: HighSystemLoad
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: development
    annotations:
      summary: 'High System Load: {{ $labels.instance }}'
      description: CPU Load exceeds the number of cores.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: avg by (instance, env) (node_load1{env="development"}) > avg by (instance, env) (count without (cpu, mode) (node_cpu_seconds_total{env="development",
          mode="idle"}))
        refId: A
  - uid: Dev_networkerrors
    title: NetworkErrors
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: server
      env: development
    annotations:
      summary: 'Network Errors Detected: {{ $labels.instance }}'
      description: Network interfaces are dropping packets or reporting errors.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: max by (instance, env, device) (rate(node_network_receive_drop_total{env="development"}[5m])) > 0 
          or max by (instance, env, device) (rate(node_network_transmit_drop_total{env="development"}[5m])) > 0 
          or max by (instance, env, device) (rate(node_network_receive_errs_total{env="development"}[5m])) > 0 
          or max by (instance, env, device) (rate(node_network_transmit_errs_total{env="development"}[5m])) > 0
        refId: A
  - uid: Dev_hostdown
    title: HostDown
    condition: A
    for: 2m
    labels:
      severity: critical
      domain: server
      env: development
    annotations:
      summary: 'Host Down: {{ $labels.instance }}'
      description: Node exporter down for 2 minutes.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: up{env="development", job="integrations/node_exporter"} == 0
        refId: A
  - uid: Dev_oomkills
    title: OOMKills
    condition: A
    for: 0s
    labels:
      severity: critical
      domain: server
      env: development
    annotations:
      summary: OOM Kill Detected on {{ $labels.instance }}
      description: A container was killed due to Out Of Memory.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: increase(container_oom_events_total{env="development"}[5m]) > 0
        refId: A
- orgId: 1
  name: application_alerts_development
  folder: Development
  interval: 1m
  rules:
  - uid: Dev_blackboxuptimedown
    title: BlackboxUptimeDown
    condition: A
    for: 2m
    labels:
      severity: critical
      domain: application
      env: development
    annotations:
      summary: 'Endpoint Unreachable: {{ $labels.instance }}'
      description: Blackbox prober failed to reach the endpoint.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: probe_success{env="development"} == 0
        refId: A
  - uid: Dev_nginxerror500
    title: NginxError500
    condition: A
    for: 5m
    labels:
      severity: critical
      domain: application
      env: development
    annotations:
      summary: 'High Nginx 5xx Error Rate: {{ $labels.instance }}'
      description: More than 5% of requests returned 5xx status codes.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (sum by (instance) (rate(nginx_http_requests_total{env="development", status=~"5.."}[5m]))
          / sum by (instance) (rate(nginx_http_requests_total{env="development"}[5m]))) * 100 > 5
        refId: A
  - uid: Dev_tracingerror500
    title: TracingError500
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: application
      env: development
    annotations:
      summary: 'High Tracing Error Rate: {{ $labels.instance }}'
      description: More than 5% of traced requests have errors.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (sum by (instance) (rate(traces_spanmetrics_calls_total{env="development", status_code="STATUS_CODE_ERROR"}[5m]))
          / sum by (instance) (rate(traces_spanmetrics_calls_total{env="development"}[5m]))) * 100
          > 5
        refId: A
  - uid: Dev_highresponsetime
    title: HighResponseTime
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: application
      env: development
    annotations:
      summary: 'High Latency: {{ $labels.instance }}'
      description: Response time is above 3 seconds.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: probe_duration_seconds{env="development"} > 3
        refId: A
  - uid: Dev_sslcertexpiring
    title: SSLCertExpiring
    condition: A
    for: 1h
    labels:
      severity: warning
      domain: application
      env: development
    annotations:
      summary: 'SSL Cert Expiring Soon: {{ $labels.instance }}'
      description: SSL certificate expires in less than 14 days.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: probe_ssl_earliest_cert_expiry{env="development"} - time() < 1209600
        refId: A
  - uid: Dev_appcontainerdown
    title: AppContainerDown
    condition: A
    for: 0s
    labels:
      severity: critical
      domain: application
      env: development
    annotations:
      summary: 'App/Traefik Container Down: {{ $labels.instance }}'
      description: Container has not been seen for more than 60 seconds.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: time() - container_last_seen{env="development", name=~".*traefik.*|.*app.*"}
          > 60
        refId: A
- orgId: 1
  name: database_alerts_development
  folder: Development
  interval: 1m
  rules:
  - uid: Dev_dbconnectiondrop
    title: DBConnectionDrop
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: database
      env: development
    annotations:
      summary: 'Sudden DB Connections Spike/Drop: {{ $labels.instance }}'
      description: Active connections dropped or spiked drastically.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: abs(deriv(pg_stat_activity_count{env="development"}[5m])) > 50
        refId: A
  - uid: Dev_dbdown
    title: DBDown
    condition: A
    for: 2m
    labels:
      severity: critical
      domain: database
      env: development
    annotations:
      summary: 'Database Down: {{ $labels.instance }}'
      description: Database exporter cannot connect or is down.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: up{env="development", job=~".*postgres.*|.*mysql.*"} == 0
        refId: A
  - uid: Dev_highquerylatency
    title: HighQueryLatency
    condition: A
    for: 5m
    labels:
      severity: warning
      domain: database
      env: development
    annotations:
      summary: 'High DB Query Latency: {{ $labels.instance }}'
      description: Average query latency is unusually high.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: rate(pg_stat_database_blks_read{env="development"}[5m]) > 1000
        refId: A
  - uid: Dev_deadlocksdetected
    title: DeadlocksDetected
    condition: A
    for: 0s
    labels:
      severity: critical
      domain: database
      env: development
    annotations:
      summary: 'Deadlocks Detected: {{ $labels.instance }}'
      description: Database deadlocks detected.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: increase(pg_stat_database_deadlocks{env="development"}[5m]) > 0
        refId: A
  - uid: Dev_dbdiskalmostfull
    title: DBDiskAlmostFull
    condition: A
    for: 5m
    labels:
      severity: critical
      domain: database
      env: development
    annotations:
      summary: 'DB Disk Almost Full: {{ $labels.instance }}'
      description: Database disk space is below 20%.
    noDataState: OK
    executionErrorState: Error
    data:
    - refId: A
      datasourceUid: mimir
      relativeTimeRange:
        from: 600
        to: 0
      model:
        expr: (avg by (instance, env, mountpoint) (node_filesystem_avail_bytes{env="development", mountpoint=~".*/data.*|.*mysql.*"})
          / avg by (instance, env, mountpoint) (node_filesystem_size_bytes{env="development", mountpoint=~".*/data.*|.*mysql.*"}))
          * 100 < 20
        refId: A
